name: focuslock
description: Social Media Usage Tracker & App Blocker
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.2

  # Storage
  shared_preferences: ^2.3.2
  sqflite: ^2.3.3+1
  flutter_secure_storage: ^9.2.2
  path: ^1.9.0

  # Background Monitoring
  flutter_foreground_task: ^8.13.0

  # Usage Stats & App Detection
  app_usage: ^4.0.1

  # Notifications
  flutter_local_notifications: ^17.2.3

  # Charts & UI
  fl_chart: ^0.68.0
  flutter_native_splash: ^2.4.1

  # Sensors
  sensors_plus: ^6.1.0

  # Permissions
  permission_handler: ^11.3.1

  # Utilities
  intl: ^0.19.0
  uuid: ^4.4.2
  http: ^1.2.2
  cupertino_icons: ^1.0.6
  timezone: ^0.9.4
  font_awesome_flutter: ^10.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_native_splash:
  color: "#0A0E27"
  color_dark: "#0A0E27"
  image: assets/images/splash_logo.png
  android_12:
    image: assets/images/splash_logo.png
    icon_background_color: "#0A0E27"
